name: consulting_agents

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: consulting
      POSTGRES_USER: consulting
      POSTGRES_PASSWORD: consulting
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consulting -d consulting"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
